<!DOCTYPE html>
<html>
<head>
<title>Jarvis Aviator Ultimate</title>

<style>
body{
  margin:0;
  background:#020617;
  color:white;
  font-family:system-ui;
  text-align:center;
}

h1{color:#22c55e; margin:10px;}

#multiplier{
  font-size:80px;
  text-shadow:0 0 25px red;
}

#gameArea{
  position:relative;
  width:100%;
  height:300px;
  overflow:hidden;
  border-top:1px solid #1e293b;
  border-bottom:1px solid #1e293b;
}

/* GRID BACKGROUND */
#grid{
  position:absolute;
  width:200%;
  height:100%;
  background:
    linear-gradient(#0f172a 1px, transparent 1px),
    linear-gradient(90deg,#0f172a 1px, transparent 1px);
  background-size:40px 40px;
  animation:moveGrid 2s linear infinite;
}

@keyframes moveGrid{
  from{transform:translateX(0);}
  to{transform:translateX(-40px);}
}

canvas{position:absolute;}

#plane{
  position:absolute;
  font-size:34px;
  transform:translate(-50%,-50%);
  filter:drop-shadow(0 0 10px red);
}

button{
  padding:10px 18px;
  margin:6px;
  border:none;
  border-radius:6px;
}

#betBtn{background:#22c55e;}
#cashBtn{background:#ef4444;}
</style>
</head>

<body>

<h1>✈️ Jarvis Aviator</h1>

<div id="balance">Balance: ₹1000</div>
<div id="multiplier">1.00x</div>

<input type="number" id="bet" value="100"><br>

<button id="betBtn" onclick="startGame()">Bet</button>
<button id="cashBtn" onclick="cashOut()">Cash Out</button>

<div id="gameArea">
  <div id="grid"></div>
  <canvas id="graph" width="800" height="300"></canvas>
  <div id="plane">✈️</div>
</div>

<p id="result"></p>

<!-- 🔊 SOUND -->
<audio id="engine" src="https://www.soundjay.com/mechanical/airplane-flying-01.mp3" loop></audio>
<audio id="crash" src="https://www.soundjay.com/explosion/explosion-01.mp3"></audio>

<script>

let multiplier=1, balance=1000, bet=100;
let crashed=true, x=50;

let ctx=document.getElementById("graph").getContext("2d");
let plane=document.getElementById("plane");

let engine=document.getElementById("engine");
let crashSound=document.getElementById("crash");

// START GAME
function startGame(){

bet=parseInt(document.getElementById("bet").value);
if(bet>balance) return alert("Low balance");

balance-=bet;
document.getElementById("balance").innerText="Balance: ₹"+balance;

multiplier=1;
crashed=false;
x=50;

ctx.clearRect(0,0,800,300);
ctx.beginPath();
ctx.moveTo(50,280);

// 🔊 ENGINE SOUND START
engine.currentTime=0;
engine.play();

function animate(){

if(crashed) return;

multiplier*=1.025;
document.getElementById("multiplier").innerText=multiplier.toFixed(2)+"x";

// smooth curve
let y=280-Math.pow(multiplier,1.6)*3;
if(y<40) y=40;

// glow line
ctx.strokeStyle="red";
ctx.shadowBlur=25;
ctx.lineWidth=5;
ctx.lineTo(x,y);
ctx.stroke();

// plane movement
plane.style.left=x+"px";
plane.style.top=y+"px";

// tilt
let angle=Math.min(50,multiplier*4);
plane.style.transform=`translate(-50%,-50%) rotate(${angle}deg)`;

x+=3;

// crash logic
if(Math.random()<0.012+multiplier/120){
crashed=true;

// 🔊 SOUND STOP + CRASH
engine.pause();
crashSound.play();

document.getElementById("result").innerText="💥 "+multiplier.toFixed(2)+"x";
return;
}

requestAnimationFrame(animate);
}

animate();
}

// CASHOUT
function cashOut(){
if(!crashed){
crashed=true;

engine.pause();

let win=bet*multiplier;
balance+=Math.floor(win);

document.getElementById("balance").innerText="Balance: ₹"+balance;
document.getElementById("result").innerText="✅ "+multiplier.toFixed(2)+"x";
}
}

</script>
</body>
</html>
