<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aviator Engine Pro</title>
    <style>
        :root { --red: #ff003c; --green: #2ecc71; --gold: #f1c40f; }
        body { margin: 0; background: #000; color: white; font-family: -apple-system, sans-serif; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        
        /* Premium Start Screen */
        #gate { 
            position: fixed; inset: 0; 
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%); 
            z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; 
        }
        
        .plane-logo { font-size: 80px; margin-bottom: 10px; filter: drop-shadow(0 0 20px var(--red)); animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        #gate button { 
            padding: 22px 70px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.2); 
            background: var(--red); color: white; font-weight: 900; font-size: 24px; cursor: pointer; 
            box-shadow: 0 15px 35px rgba(255, 0, 60, 0.4); text-transform: uppercase; letter-spacing: 2px;
            transition: 0.3s;
        }
        #gate button:active { transform: scale(0.9); box-shadow: 0 5px 15px rgba(255, 0, 60, 0.2); }

        .container { width: 92%; max-width: 400px; display: flex; flex-direction: column; gap: 15px; }
        .screen { position: relative; height: 350px; background: #050505; border-radius: 25px; border: 1px solid #222; overflow: hidden; box-shadow: inset 0 0 40px #000; }
        
        #mult { position: absolute; top: 35%; left: 50%; transform: translate(-50%, -50%); font-size: 85px; font-weight: 900; z-index: 10; font-variant-numeric: tabular-nums; }
        #plane { position: absolute; width: 55px; z-index: 20; display: none; filter: drop-shadow(0 0 15px var(--red)); }
        
        .controls { background: #1c1c1e; padding: 20px; border-radius: 30px; border: 1px solid #333; }
        #btn { width: 100%; padding: 20px; border-radius: 18px; border: none; font-size: 26px; font-weight: 900; transition: 0.1s; }
        .bet-btn { background: var(--green); color: white; box-shadow: 0 5px 0 #14532d; }
        .cash-btn { background: var(--gold); color: black; box-shadow: 0 5px 0 #713f12; }
        
        canvas { position: absolute; inset: 0; }
    </style>
</head>
<body>

<div id="gate">
    <div class="plane-logo">🚀</div>
    <h2 style="letter-spacing: 4px; font-weight: 300; margin-bottom: 30px;">AVIATOR PRO</h2>
    <button onclick="unlockAudio()">START GAME</button>
    <p style="color:#444; margin-top:25px; font-size:11px; text-transform: uppercase; letter-spacing: 2px;">Enter the Cockpit</p>
</div>

<div class="container">
    <div style="display:flex; justify-content: space-between; font-weight: bold; padding: 0 10px;">
        <span style="color:var(--green)">₹<span id="bal">1000.00</span></span>
        <span style="color:#444">PREMIUM REPLICA</span>
    </div>
    
    <div class="screen">
        <div id="mult">1.00x</div>
        <svg id="plane" viewBox="0 0 64 64"><path fill="#ff003c" d="M62,32c0-1.1-0.9-2-2-2H42.7L28.1,7.2C27.6,6.5,26.8,6,25.9,6h-5.5c-0.8,0-1.4,0.7-1.3,1.5l5,18.5H10.2l-3.4-6.8 C6.4,18.5,5.7,18,5,18H2c-0.6,0-1,0.4-1,1s0.4,1,1,1h1.6l3.4,6.8c0.2,0.4,0.6,0.7,1.1,0.7h16.2L18.9,47.5c-0.1,0.3-0.1,0.6,0.1,0.9 c0.2,0.3,0.5,0.5,0.9,0.5h5.5c0.9,0,1.7-0.5,2.2-1.2L42.7,34H60C61.1,34,62,33.1,62,32z"/></svg>
        <canvas id="cvs"></canvas>
    </div>

    <div class="controls">
        <div style="background:#000; border-radius:15px; padding:15px; margin-bottom:15px; border:1px solid #444; text-align:center;">
            <input type="number" id="bet" value="100" style="background:transparent; border:none; color:white; font-size:30px; font-weight:900; width:100%; text-align:center; outline:none;">
        </div>
        <button id="btn" class="bet-btn" onclick="action()">BET</button>
    </div>
</div>

<script>
    let audioCtx;
    
    function unlockAudio() {
        document.getElementById('gate').style.display = 'none';
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        gain.gain.value = 0;
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(0.1);
    }

    function beep(freq, duration, type = 'sine', vol = 0.1) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        g.gain.setValueAtTime(vol, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(g); g.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    }

    const cvs = document.getElementById('cvs'), ctx = cvs.getContext('2d');
    const multD = document.getElementById('mult'), pln = document.getElementById('plane'), bt = document.getElementById('btn');
    let bal = 1000, running = false, multiplier = 1.0, crashAt = 0, startT = 0, aid;

    window.onresize = () => { cvs.width = cvs.offsetWidth; cvs.height = cvs.offsetHeight; };
    window.onresize();

    function action() { if(!running) start(); else cash(); }

    function start() {
        let amt = parseFloat(document.getElementById('bet').value);
        if(amt > bal) return;
        bal -= amt; updateUI();
        running = true; multiplier = 1.0;
        crashAt = Math.random() < 0.15 ? 1.0 + Math.random()*0.1 : 1.5 + Math.random()*8;
        bt.innerText = "CASH OUT"; bt.className = "cash-btn";
        pln.style.display = "block"; multD.style.color = "white";
        startT = Date.now();
        game();
    }

    function game() {
        if(!running) return;
        let t = (Date.now() - startT) / 1000;
        multiplier = Math.pow(1.17, t * 3.5).toFixed(2);
        if(parseFloat(multiplier) >= crashAt) return end(true);
        if(Math.random() < 0.08) beep(100 + (multiplier * 20), 0.1, 'sawtooth', 0.03);
        multD.innerText = multiplier + "x";
        draw(t);
        aid = requestAnimationFrame(game);
    }

    function draw(t) {
        ctx.clearRect(0,0,cvs.width,cvs.height);
        let x = t * 70, y = cvs.height - (Math.pow(1.12, x/8) * 15);
        ctx.beginPath(); ctx.strokeStyle = "#ff003c"; ctx.lineWidth = 6; ctx.shadowBlur = 20; ctx.shadowColor = "#ff003c";
        ctx.moveTo(0, cvs.height);
        for(let i=0; i<=x; i++) ctx.lineTo(i, cvs.height - (Math.pow(1.12, i/8) * 15));
        ctx.stroke();
        pln.style.left = (x - 25) + "px"; pln.style.top = (y - 30) + "px";
        pln.style.transform = `rotate(-${Math.min(x/5, 40)}deg)`;
    }

    function cash() {
        let amt = parseFloat(document.getElementById('bet').value);
        bal += (amt * multiplier);
        beep(880, 0.6, 'sine', 0.2);
        end(false);
    }

    function end(c) {
        running = false; cancelAnimationFrame(aid);
        if(c) {
            beep(60, 0.5, 'square', 0.3);
            multD.innerText = "FLEW AWAY!"; multD.style.color = "var(--red)"; pln.style.display = "none";
        }
        bt.innerText = "BET"; bt.className = "bet-btn";
        updateUI();
    }

    function updateUI() { document.getElementById('bal').innerText = bal.toFixed(2); }
</script>
</body>
</html>
