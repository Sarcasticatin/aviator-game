<!DOCTYPE html>
<html>
<head>
<title>Jarvis Aviator Pro</title>

<style>
body{
  background:#020617;
  color:white;
  font-family:system-ui;
  text-align:center;
}

h1{color:#22c55e; margin-top:10px;}

#multiplier{
  font-size:70px;
  font-weight:bold;
  margin:10px;
  text-shadow:0 0 20px red;
}

#status{
  font-size:14px;
  opacity:0.7;
}

#gameArea{
  position:relative;
  width:360px;
  height:260px;
  margin:auto;
  border-radius:12px;
  background:#020617;
  border:1px solid #1e293b;
  overflow:hidden;
  box-shadow:0 0 30px rgba(255,0,0,0.3);
}

canvas{position:absolute;}

#plane{
  position:absolute;
  font-size:26px;
  transform:translate(-50%,-50%);
  filter:drop-shadow(0 0 8px red);
}

button{
  padding:10px 18px;
  margin:6px;
  border:none;
  border-radius:6px;
}

#betBtn{background:#22c55e;}
#cashBtn{background:#ef4444;}

</style>
</head>

<body>

<h1>✈️ Jarvis Aviator</h1>

<div id="balance">Balance: ₹1000</div>
<div id="multiplier">1.00x</div>
<div id="status">Waiting for next round...</div>

<input type="number" id="bet" value="100"><br>

<button id="betBtn" onclick="startGame()">Bet</button>
<button id="cashBtn" onclick="cashOut()">Cash Out</button>

<div id="gameArea">
  <canvas id="graph" width="360" height="260"></canvas>
  <div id="plane">✈️</div>
</div>

<p id="result"></p>

<script>

let multiplier=1, balance=1000, bet=100;
let crashed=true, interval, x=0;

let ctx=document.getElementById("graph").getContext("2d");
let plane=document.getElementById("plane");

function startGame(){

bet=parseInt(document.getElementById("bet").value);
if(bet>balance) return alert("Low balance");

balance-=bet;
document.getElementById("balance").innerText="Balance: ₹"+balance;

document.getElementById("status").innerText="Flying...";
document.getElementById("result").innerText="";

multiplier=1;
crashed=false;
x=0;

ctx.clearRect(0,0,360,260);
ctx.beginPath();
ctx.moveTo(0,260);

interval=setInterval(()=>{

multiplier*=1.03;
document.getElementById("multiplier").innerText=multiplier.toFixed(2)+"x";

// smooth curve
let y = 260 - Math.pow(multiplier,1.6)*4;
if(y<30) y=30;

// glow
ctx.strokeStyle="red";
ctx.shadowBlur=20;
ctx.lineWidth=3;
ctx.lineTo(x,y);
ctx.stroke();

// center feel movement
plane.style.left = x + "px";
plane.style.top = y + "px";

let angle=Math.min(50,multiplier*4);
plane.style.transform=`translate(-50%,-50%) rotate(${angle}deg)`;

x+=2.5;

// crash logic
if(Math.random()<0.012+multiplier/120){
clearInterval(interval);
crashed=true;

document.getElementById("status").innerText="Crashed!";
document.getElementById("result").innerText="💥 "+multiplier.toFixed(2)+"x";

setTimeout(()=>{
document.getElementById("status").innerText="Waiting for next round...";
},2000);

}

},80);
}

function cashOut(){
if(!crashed && interval){
clearInterval(interval);

let win=bet*multiplier;
balance+=Math.floor(win);

document.getElementById("balance").innerText="Balance: ₹"+balance;
document.getElementById("result").innerText="✅ "+multiplier.toFixed(2)+"x";
document.getElementById("status").innerText="Cashed Out!";
}
}

</script>
</body>
</html>
