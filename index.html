<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jarvis Aviator - World Edition</title>
    <style>
        :root { --bg: #000; --red: #e11d48; --green: #22c55e; --gold: #eab308; --panel: #18181b; }
        body { margin: 0; background: var(--bg); color: white; font-family: -apple-system, system-ui; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        
        /* iPhone Audio Unlock Overlay */
        #unlocker { position: fixed; inset: 0; background: radial-gradient(circle, #222, #000); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #unlocker button { padding: 20px 40px; border-radius: 12px; border: 2px solid var(--red); background: transparent; color: white; font-weight: 900; font-size: 20px; cursor: pointer; box-shadow: 0 0 20px var(--red); }

        .app { width: 95%; max-width: 450px; display: flex; flex-direction: column; gap: 10px; height: 95vh; }
        
        /* History Bar */
        .history { display: flex; gap: 6px; overflow-x: auto; padding: 5px 0; scrollbar-width: none; }
        .hist-chip { background: #27272a; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; color: #a855f7; border: 1px solid #3f3f46; }

        .stage { position: relative; height: 380px; background: #09090b; border-radius: 20px; border: 1px solid #27272a; overflow: hidden; }
        #multiplier { position: absolute; top: 35%; left: 50%; transform: translate(-50%, -50%); font-size: 80px; font-weight: 950; z-index: 10; text-shadow: 0 0 30px rgba(0,0,0,0.5); }
        
        #plane { position: absolute; width: 55px; z-index: 20; display: none; filter: drop-shadow(0 0 10px var(--red)); }

        .controls { background: var(--panel); padding: 20px; border-radius: 24px; border: 1px solid #27272a; }
        .input-wrap { background: #000; border-radius: 12px; padding: 12px; margin-bottom: 15px; border: 1px solid #3f3f46; display: flex; justify-content: center; }
        input { background: transparent; border: none; color: white; font-size: 28px; font-weight: 900; width: 100%; text-align: center; outline: none; }

        #btn { width: 100%; padding: 20px; border-radius: 16px; border: none; font-size: 24px; font-weight: 900; letter-spacing: 1px; transition: 0.1s; }
        .bet { background: var(--green); color: white; box-shadow: 0 4px 0 #166534; }
        .cash { background: var(--gold); color: black; box-shadow: 0 4px 0 #a16207; }
        
        .flew { color: var(--red) !important; animation: crash-shake 0.4s; }
        @keyframes crash-shake { 0%,100%{transform:translate(-50%,-50%)} 20%{transform:translate(-55%,-50%)} 80%{transform:translate(-45%,-50%)} }
        
        canvas { position: absolute; inset: 0; width: 100%; height: 100%; }
    </style>
</head>
<body>

<div id="unlocker">
    <div style="font-size: 70px; margin-bottom: 20px;">✈️</div>
    <button onclick="startApp()">START ENGINE</button>
    <p style="color:#555; margin-top:15px; font-size:12px;">Ensure Ringer is ON (No Silent Mode)</p>
</div>

<div class="app">
    <div style="display:flex; justify-content:space-between; align-items:center; font-size:14px;">
        <span style="color:var(--green); font-weight:900;">₹<span id="bal">1000.00</span></span>
        <span style="color:#555">JARVIS ELITE</span>
    </div>
    <div class="history" id="hist"></div>
    <div class="stage">
        <div id="multiplier">1.00x</div>
        <svg id="plane" viewBox="0 0 64 64"><path fill="#f43f5e" d="M62,32c0-1.1-0.9-2-2-2H42.7L28.1,7.2C27.6,6.5,26.8,6,25.9,6h-5.5c-0.8,0-1.4,0.7-1.3,1.5l5,18.5H10.2l-3.4-6.8 C6.4,18.5,5.7,18,5,18H2c-0.6,0-1,0.4-1,1s0.4,1,1,1h1.6l3.4,6.8c0.2,0.4,0.6,0.7,1.1,0.7h16.2L18.9,47.5c-0.1,0.3-0.1,0.6,0.1,0.9 c0.2,0.3,0.5,0.5,0.9,0.5h5.5c0.9,0,1.7-0.5,2.2-1.2L42.7,34H60C61.1,34,62,33.1,62,32z"/></svg>
        <canvas id="cvs"></canvas>
    </div>
    <div class="controls">
        <div class="input-wrap"><input type="number" id="amt" value="100" inputmode="decimal"></div>
        <button id="btn" class="bet" onclick="play()">BET</button>
    </div>
</div>

<script>
    let audioCtx, eng;
    const urls = {
        eng: 'https://cdn.pixabay.com/audio/2022/03/15/audio_2492167e7d.mp3',
        win: 'https://cdn.pixabay.com/audio/2021/08/04/audio_0625c15354.mp3',
        exp: 'https://cdn.pixabay.com/audio/2022/03/10/audio_c3523e58c5.mp3'
    };

    function startApp() {
        document.getElementById('unlocker').style.display='none';
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        eng = new Audio(urls.eng); eng.loop = true; eng.volume = 0.5;
        // Pre-play all to bypass iPhone restrictions
        [urls.win, urls.exp].forEach(u => { let a=new Audio(u); a.muted=true; a.play().then(()=>a.pause()); });
    }

    const cvs = document.getElementById('cvs'), ctx = cvs.getContext('2d');
    const multD = document.getElementById('multiplier'), pln = document.getElementById('plane'), bt = document.getElementById('btn');
    let balance = 1000, multiplier = 1.0, running = false, crash = 0, start = 0, aid;

    window.onresize = () => { cvs.width = cvs.offsetWidth; cvs.height = cvs.offsetHeight; };
    window.onresize();

    function play() { if(!running) startR(); else cash(); }

    function startR() {
        let a = parseFloat(document.getElementById('amt').value);
        if(a > balance) return;
        balance -= a; document.getElementById('bal').innerText = balance.toFixed(2);
        running = true; multiplier = 1.0;
        let r = Math.random();
        crash = r < 0.1 ? 1 + Math.random()*0.1 : (r < 0.8 ? 1.2 + Math.random()*2 : 4 + Math.random()*12);
        bt.innerText = "CASH OUT"; bt.className = "cash";
        multD.classList.remove('flew'); pln.style.display = "block";
        if(eng) { eng.currentTime = 0; eng.play(); }
        start = Date.now(); loop();
    }

    function loop() {
        if(!running) return;
        let t = (Date.now() - start) / 1000;
        multiplier = Math.pow(1.16, t * 3.5).toFixed(2);
        if(parseFloat(multiplier) >= crash) return stop(true);
        multD.innerText = multiplier + "x";
        draw(t);
        aid = requestAnimationFrame(loop);
    }

    function draw(t) {
        ctx.clearRect(0,0,cvs.width,cvs.height);
        let x = t * 65, y = cvs.height - (Math.pow(1.12, x/8) * 15);
        
        // Premium Fill Gradient
        let grad = ctx.createLinearGradient(0, cvs.height, x, y);
        grad.addColorStop(0, "rgba(225, 29, 72, 0)");
        grad.addColorStop(1, "rgba(225, 29, 72, 0.3)");
        ctx.fillStyle = grad;
        ctx.beginPath(); ctx.moveTo(0, cvs.height);
        for(let i=0; i<=x; i++) ctx.lineTo(i, cvs.height - (Math.pow(1.12, i/8) * 15));
        ctx.lineTo(x, cvs.height); ctx.fill();

        // Neon Line
        ctx.beginPath(); ctx.strokeStyle = "#e11d48"; ctx.lineWidth = 6; ctx.shadowBlur = 15; ctx.shadowColor = "#f43f5e";
        ctx.moveTo(0, cvs.height);
        for(let i=0; i<=x; i++) ctx.lineTo(i, cvs.height - (Math.pow(1.12, i/8) * 15));
        ctx.stroke(); ctx.shadowBlur = 0;

        pln.style.left = (x - 25) + "px"; pln.style.top = (y - 30) + "px";
        pln.style.transform = `rotate(-${Math.min(x/5, 40)}deg)`;
    }

    function cash() {
        let a = parseFloat(document.getElementById('amt').value);
        balance += (a * multiplier);
        new Audio(urls.win).play();
        stop(false);
    }

    function stop(c) {
        running = false; cancelAnimationFrame(aid);
        if(eng) eng.pause();
        if(c) { 
            new Audio(urls.exp).play(); multD.innerText = "FLEW AWAY!"; multD.classList.add('flew'); pln.style.display="none"; 
        }
        let h = document.getElementById('hist'), c_h = document.createElement('div');
        c_h.className = "hist-chip"; c_h.innerText = multiplier + "x";
        h.prepend(c_h);
        bt.innerText = "BET"; bt.className = "bet";
        document.getElementById('bal').innerText = balance.toFixed(2);
    }
</script>
</body>
</html>
