<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviator Ultimate Replica</title>
    <style>
        :root {
            --bg-dark: #090909;
            --panel-bg: #1b1c21;
            --accent-red: #cb011a;
            --aviator-purple: #9d50bb;
            --win-green: #28a745;
            --text-gray: #aeaeae;
        }

        body {
            margin: 0;
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .game-wrapper {
            width: 95%;
            max-width: 1000px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* History Bar */
        .history-bar {
            display: flex;
            gap: 8px;
            background: #141518;
            padding: 10px;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid #2c2d30;
        }

        .hist-item {
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: bold;
            background: #2c2d30;
            color: #9d50bb;
        }

        /* Main Stage */
        .stage {
            position: relative;
            background: #000;
            height: 400px;
            border-radius: 15px;
            border: 1px solid #2c2d30;
            overflow: hidden;
        }

        #multiplier {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 70px;
            font-weight: 800;
            z-index: 5;
            text-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        #canvas { width: 100%; height: 100%; }

        /* The Plane SVG */
        #plane-icon {
            position: absolute;
            width: 60px;
            z-index: 10;
            filter: drop-shadow(0 0 10px var(--accent-red));
            display: none;
        }

        /* Controls */
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            background: var(--panel-bg);
            padding: 20px;
            border-radius: 15px;
        }

        .bet-box {
            background: #141518;
            border-radius: 10px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid #333;
        }

        .bet-input-area {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        input {
            background: #000;
            border: 1px solid #444;
            color: white;
            padding: 8px;
            width: 80px;
            border-radius: 5px;
            text-align: center;
            font-size: 18px;
        }

        .btn-main {
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            border: none;
            font-size: 20px;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
        }

        .bet-btn { background: var(--win-green); color: white; }
        .cash-btn { background: #d29100; color: white; }
        
        .flew-away { color: var(--accent-red) !important; }

        .balance-box {
            text-align: right;
            color: var(--win-green);
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

<div class="game-wrapper">
    <div class="balance-box">Wallet: ₹<span id="balance">1000.00</span></div>
    
    <div class="history-bar" id="history">
        <div class="hist-item">1.22x</div>
        <div class="hist-item" style="color:#9d50bb">5.40x</div>
        <div class="hist-item">2.10x</div>
    </div>

    <div class="stage">
        <div id="multiplier">1.00x</div>
        <svg id="plane-icon" viewBox="0 0 64 64">
            <path fill="#cb011a" d="M62,32c0-1.1-0.9-2-2-2H42.7L28.1,7.2C27.6,6.5,26.8,6,25.9,6h-5.5c-0.8,0-1.4,0.7-1.3,1.5l5,18.5H10.2l-3.4-6.8 C6.4,18.5,5.7,18,5,18H2c-0.6,0-1,0.4-1,1s0.4,1,1,1h1.6l3.4,6.8c0.2,0.4,0.6,0.7,1.1,0.7h16.2L18.9,47.5c-0.1,0.3-0.1,0.6,0.1,0.9 c0.2,0.3,0.5,0.5,0.9,0.5h5.5c0.9,0,1.7-0.5,2.2-1.2L42.7,34H60C61.1,34,62,33.1,62,32z"/>
        </svg>
        <canvas id="canvas"></canvas>
    </div>

    <div class="controls">
        <div class="bet-box">
            <div class="bet-input-area">
                <input type="number" id="bet-amt" value="100">
            </div>
            <button id="btn-1" class="btn-main bet-btn" onclick="handleInteraction()">BET</button>
        </div>
        <div class="bet-box" style="opacity: 0.5;">
            <div class="bet-input-area">
                <input type="number" value="200" disabled>
            </div>
            <button class="btn-main bet-btn" disabled>BET</button>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const multDisplay = document.getElementById('multiplier');
    const plane = document.getElementById('plane-icon');
    const btn = document.getElementById('btn-1');
    const historyDiv = document.getElementById('history');

    let balance = 1000;
    let multiplier = 1.00;
    let isRunning = false;
    let crashValue = 0;
    let startTime = 0;
    let animationId;

    function resize() {
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    function handleInteraction() {
        if (!isRunning) startRound();
        else cashOut();
    }

    function startRound() {
        const bet = parseFloat(document.getElementById('bet-amt').value);
        if (bet > balance) return alert("Low Balance");

        balance -= bet;
        updateBalance();

        isRunning = true;
        multiplier = 1.00;
        // Crash logic: weighted to crash early but occasional high spikes
        crashValue = Math.random() < 0.15 ? (Math.random() * 10 + 2) : (Math.random() * 2.5 + 1.1);
        
        btn.innerText = "CASH OUT";
        btn.className = "btn-main cash-btn";
        multDisplay.classList.remove('flew-away');
        plane.style.display = "block";

        startTime = Date.now();
        animate();
    }

    function animate() {
        if (!isRunning) return;

        let elapsed = (Date.now() - startTime) / 1000;
        // The core Aviator math: exponential climb
        multiplier = Math.pow(1.12, elapsed * 4).toFixed(2);

        if (parseFloat(multiplier) >= crashValue) {
            finish(true);
            return;
        }

        multDisplay.innerText = multiplier + "x";
        drawScene(elapsed);
        animationId = requestAnimationFrame(animate);
    }

    function drawScene(t) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        let progress = t * 45;
        let curveX = progress;
        let curveY = canvas.height - (Math.pow(1.08, progress/4) * 5);

        // Draw the neon path
        ctx.beginPath();
        ctx.strokeStyle = "rgba(203, 1, 26, 0.8)";
        ctx.lineWidth = 4;
        ctx.moveTo(0, canvas.height);
        
        for(let i=0; i<progress; i++) {
            let x = i;
            let y = canvas.height - (Math.pow(1.08, i/4) * 5);
            ctx.lineTo(x, y);
        }
        ctx.stroke();

        // Position the plane
        plane.style.left = (curveX - 30) + "px";
        plane.style.top = (curveY - 30) + "px";
        // Tilt the plane based on height
        let angle = Math.min(progress / 5, 45);
        plane.style.transform = `rotate(-${angle}deg)`;
    }

    function cashOut() {
        if (!isRunning) return;
        let win = parseFloat(document.getElementById('bet-amt').value) * multiplier;
        balance += win;
        finish(false);
    }

    function finish(crashed) {
        isRunning = false;
        cancelAnimationFrame(animationId);
        
        if (crashed) {
            multDisplay.innerText = "FLEW AWAY!";
            multDisplay.classList.add('flew-away');
            plane.style.display = "none";
        }

        // Add to history
        const item = document.createElement('div');
        item.className = "hist-item";
        item.innerText = multiplier + "x";
        if (multiplier > 2) item.style.color = "#9d50bb";
        historyDiv.prepend(item);

        btn.innerText = "BET";
        btn.className = "btn-main bet-btn";
        updateBalance();
    }

    function updateBalance() {
        document.getElementById('balance').innerText = balance.toFixed(2);
    }
</script>

</body>
</html>
