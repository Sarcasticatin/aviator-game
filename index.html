<!DOCTYPE html>
<html>
<head>
<title>Jarvis Aviator Pro+</title>

<style>
body{
  background:#020617;
  color:white;
  font-family:system-ui;
  text-align:center;
}

h1{color:#22c55e;}

#multiplier{
  font-size:75px;
  font-weight:bold;
  text-shadow:0 0 25px red;
}

#gameArea{
  position:relative;
  width:360px;
  height:260px;
  margin:auto;
  border-radius:12px;
  background:#020617;
  border:1px solid #1e293b;
  overflow:hidden;
  box-shadow:0 0 35px rgba(255,0,0,0.3);
}

canvas{position:absolute;}

#plane{
  position:absolute;
  font-size:30px;
  transform:translate(-50%,-50%);
  filter:drop-shadow(0 0 10px red);
}

button{
  padding:10px 18px;
  margin:6px;
  border:none;
  border-radius:6px;
}

#betBtn{background:#22c55e;}
#cashBtn{background:#ef4444;}
</style>
</head>

<body>

<h1>✈️ Jarvis Aviator</h1>

<div id="balance">Balance: ₹1000</div>
<div id="multiplier">1.00x</div>

<input type="number" id="bet" value="100"><br>

<button id="betBtn" onclick="startGame()">Bet</button>
<button id="cashBtn" onclick="cashOut()">Cash Out</button>

<div id="gameArea">
  <canvas id="graph" width="360" height="260"></canvas>
  <div id="plane">✈️</div>
</div>

<p id="result"></p>

<!-- SOUND -->
<audio id="engine" src="https://www.soundjay.com/mechanical/airplane-flying-01.mp3" loop></audio>
<audio id="crash" src="https://www.soundjay.com/explosion/explosion-01.mp3"></audio>

<script>

let multiplier=1, balance=1000, bet=100;
let crashed=true, x=0;

let ctx=document.getElementById("graph").getContext("2d");
let plane=document.getElementById("plane");

let engine=document.getElementById("engine");
let crashSound=document.getElementById("crash");

let animation;

// START
function startGame(){

bet=parseInt(document.getElementById("bet").value);
if(bet>balance) return alert("Low balance");

balance-=bet;
document.getElementById("balance").innerText="Balance: ₹"+balance;

multiplier=1;
crashed=false;
x=0;

ctx.clearRect(0,0,360,260);
ctx.beginPath();
ctx.moveTo(0,260);

// SOUND start
engine.currentTime=0;
engine.play();

function animate(){

if(crashed) return;

multiplier*=1.02;
document.getElementById("multiplier").innerText=multiplier.toFixed(2)+"x";

// smooth curve
let y=260-Math.pow(multiplier,1.7)*3.5;
if(y<25) y=25;

// glow line
ctx.strokeStyle="red";
ctx.shadowBlur=25;
ctx.lineWidth=3;
ctx.lineTo(x,y);
ctx.stroke();

// plane movement
plane.style.left=x+"px";
plane.style.top=y+"px";

let angle=Math.min(50,multiplier*4);
plane.style.transform=`translate(-50%,-50%) rotate(${angle}deg)`;

x+=2;

// crash logic
if(Math.random()<0.012+multiplier/130){
crashed=true;

// SOUND stop + crash
engine.pause();
crashSound.play();

document.getElementById("result").innerText="💥 "+multiplier.toFixed(2)+"x";
return;
}

animation=requestAnimationFrame(animate);
}

animate();
}

// CASHOUT
function cashOut(){
if(!crashed){
crashed=true;

engine.pause();

let win=bet*multiplier;
balance+=Math.floor(win);

document.getElementById("balance").innerText="Balance: ₹"+balance;
document.getElementById("result").innerText="✅ "+multiplier.toFixed(2)+"x";
}
}

</script>
</body>
</html>
