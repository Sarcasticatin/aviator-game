<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jarvis Aviator Pro</title>
    <style>
        :root {
            --bg: #050505;
            --card: #14151a;
            --red: #d91c5c;
            --green: #28a745;
            --gold: #ffc107;
        }

        body {
            margin: 0; background: var(--bg); color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica;
            display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden;
        }

        /* Initial Audio Unlock Overlay */
        #unlock-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 999; display: flex;
            flex-direction: column; justify-content: center; align-items: center;
        }

        .main-container { width: 95%; max-width: 500px; display: flex; flex-direction: column; gap: 10px; }

        /* Multiplier Area */
        .game-view {
            position: relative; height: 320px; background: #000;
            border-radius: 20px; border: 1px solid #2d2d2d; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        #multiplier {
            font-size: 70px; font-weight: 900; z-index: 10;
            transition: transform 0.1s linear;
        }

        #plane-svg {
            position: absolute; width: 50px; z-index: 11; display: none;
            filter: drop-shadow(0 0 10px var(--red));
        }

        /* Control Panel */
        .controls {
            background: var(--card); padding: 20px; border-radius: 20px;
            display: flex; flex-direction: column; align-items: center; gap: 15px;
        }

        .bet-input-wrap {
            display: flex; background: #000; border-radius: 12px; padding: 5px 15px;
            align-items: center; border: 1px solid #333; width: 80%;
        }

        input {
            background: transparent; border: none; color: white; font-size: 24px;
            width: 100%; text-align: center; outline: none; font-weight: bold;
        }

        #action-btn {
            width: 100%; padding: 18px; border-radius: 15px; border: none;
            font-size: 22px; font-weight: 900; text-transform: uppercase; transition: 0.2s;
        }

        .bet-mode { background: var(--green); color: white; box-shadow: 0 4px 15px rgba(40, 167, 69, 0.4); }
        .cash-mode { background: #f59e0b; color: white; box-shadow: 0 4px 15px rgba(245, 158, 11, 0.4); }

        .flew-away { color: var(--red) !important; animation: shake 0.4s; }

        @keyframes shake {
            0%, 100% { transform: translate(0,0); }
            25% { transform: translate(-8px,0); }
            75% { transform: translate(8px,0); }
        }

        .stats { display: flex; justify-content: space-between; width: 100%; font-size: 13px; color: #888; }
        #canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    </style>
</head>
<body>

<div id="unlock-screen" onclick="unlockAudio()">
    <div style="font-size: 50px; margin-bottom: 20px;">✈️</div>
    <button style="padding: 15px 30px; border-radius: 30px; border: none; background: var(--red); color: white; font-weight: bold;">TAP TO START GAME</button>
    <p style="color: #666; font-size: 12px; margin-top: 15px;">Enable Sound for iPhone</p>
</div>

<div class="main-container">
    <div class="stats">
        <span>ID: #552910</span>
        <span style="color: var(--green); font-weight: bold;">₹<span id="balance">1000.00</span></span>
    </div>

    <div class="game-view">
        <div id="multiplier">1.00x</div>
        <svg id="plane-svg" viewBox="0 0 64 64"><path fill="#ff0000" d="M62,32c0-1.1-0.9-2-2-2H42.7L28.1,7.2C27.6,6.5,26.8,6,25.9,6h-5.5c-0.8,0-1.4,0.7-1.3,1.5l5,18.5H10.2l-3.4-6.8 C6.4,18.5,5.7,18,5,18H2c-0.6,0-1,0.4-1,1s0.4,1,1,1h1.6l3.4,6.8c0.2,0.4,0.6,0.7,1.1,0.7h16.2L18.9,47.5c-0.1,0.3-0.1,0.6,0.1,0.9 c0.2,0.3,0.5,0.5,0.9,0.5h5.5c0.9,0,1.7-0.5,2.2-1.2L42.7,34H60C61.1,34,62,33.1,62,32z"/></svg>
        <canvas id="canvas"></canvas>
    </div>

    <div class="controls">
        <div class="bet-input-wrap">
            <span style="color: #666; font-weight: bold;">₹</span>
            <input type="number" id="bet-amt" value="100">
        </div>
        <button id="action-btn" class="bet-mode" onclick="handleInput()">BET</button>
    </div>
</div>

<script>
    // Audio Context (iPhone needs this triggered by click)
    let audioCtx;
    const sounds = {
        engine: new Audio('https://cdn.pixabay.com/audio/2022/03/15/audio_2492167e7d.mp3'),
        crash: new Audio('https://cdn.pixabay.com/audio/2022/03/10/audio_c3523e58c5.mp3'),
        win: new Audio('https://cdn.pixabay.com/audio/2021/08/04/audio_0625c15354.mp3')
    };
    sounds.engine.loop = true;

    function unlockAudio() {
        document.getElementById('unlock-screen').style.display = 'none';
        // Play and pause all sounds once to "warm up" audio on iPhone
        Object.values(sounds).forEach(s => { s.play(); s.pause(); });
    }

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const multText = document.getElementById('multiplier');
    const plane = document.getElementById('plane-svg');
    const btn = document.getElementById('action-btn');

    let balance = 1000, multiplier = 1.0, isRunning = false, crashAt = 0, startT = 0, animId;

    function resize() { canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight; }
    window.onresize = resize; resize();

    function handleInput() {
        if (!isRunning) startRound();
        else cashOut();
    }

    function startRound() {
        let bet = parseFloat(document.getElementById('bet-amt').value);
        if (bet > balance) return alert("Low Balance!");

        balance -= bet;
        updateUI();

        isRunning = true;
        multiplier = 1.0;
        
        // --- NATURAL LOGIC ---
        // 10% chance: Instant crash (1.00x - 1.05x)
        // 60% chance: Small win (1.1x - 2.5x)
        // 30% chance: Big run (3x - 15x)
        let rand = Math.random();
        if (rand < 0.1) crashAt = 1 + Math.random() * 0.05;
        else if (rand < 0.7) crashAt = 1.1 + Math.random() * 1.4;
        else crashAt = 3 + Math.random() * 12;

        btn.innerText = "CASH OUT";
        btn.className = "cash-mode";
        multText.classList.remove('flew-away');
        plane.style.display = "block";
        
        sounds.engine.currentTime = 0;
        sounds.engine.play();
        
        startT = Date.now();
        animate();
    }

    function animate() {
        if (!isRunning) return;
        let elapsed = (Date.now() - startT) / 1000;
        
        // Smooth exponential growth
        multiplier = Math.pow(1.15, elapsed * 3.5).toFixed(2);

        if (parseFloat(multiplier) >= crashAt) return finish(true);
        
        multText.innerText = multiplier + "x";
        draw(elapsed);
        animId = requestAnimationFrame(animate);
    }

    function draw(t) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        let px = t * 65, py = canvas.height - (Math.pow(1.1, px/7) * 12);
        
        ctx.beginPath(); ctx.strokeStyle = "#d91c5c"; ctx.lineWidth = 5;
        ctx.shadowBlur = 15; ctx.shadowColor = "red";
        ctx.moveTo(0, canvas.height);
        for(let i=0; i<px; i++) ctx.lineTo(i, canvas.height - (Math.pow(1.1, i/7) * 12));
        ctx.stroke();

        plane.style.left = (px - 25) + "px"; plane.style.top = (py - 25) + "px";
        plane.style.transform = `rotate(-${Math.min(px/5, 35)}deg)`;
    }

    function cashOut() {
        if (!isRunning) return;
        let bet = parseFloat(document.getElementById('bet-amt').value);
        balance += (bet * multiplier);
        sounds.win.play();
        finish(false);
    }

    function finish(crashed) {
        isRunning = false;
        cancelAnimationFrame(animId);
        sounds.engine.pause();
        
        if (crashed) {
            sounds.crash.play();
            multText.innerText = "FLEW AWAY!";
            multText.classList.add('flew-away');
            plane.style.display = "none";
        }
        
        btn.innerText = "BET";
        btn.className = "bet-mode";
        updateUI();
    }

    function updateUI() {
        document.getElementById('balance').innerText = balance.toFixed(2);
    }
</script>

</body>
</html>
