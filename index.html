<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aviator Ultimate Fix</title>
    <style>
        :root { --red: #ff003c; --green: #2ecc71; --gold: #f1c40f; }
        body { margin: 0; background: #000; color: white; font-family: -apple-system; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        
        /* iPhone Special Unlocker */
        #audio-gate { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        #audio-gate h1 { font-size: 80px; margin: 0; filter: drop-shadow(0 0 20px var(--red)); }
        #audio-gate button { margin-top: 30px; padding: 20px 50px; border-radius: 50px; border: none; background: var(--red); color: white; font-size: 20px; font-weight: 900; box-shadow: 0 0 30px rgba(255,0,60,0.6); }

        .container { width: 92%; max-width: 400px; display: flex; flex-direction: column; gap: 15px; }
        .screen { position: relative; height: 350px; background: #050505; border-radius: 25px; border: 1px solid #222; overflow: hidden; }
        
        #mult { position: absolute; top: 35%; left: 50%; transform: translate(-50%, -50%); font-size: 80px; font-weight: 900; z-index: 10; }
        #plane { position: absolute; width: 50px; z-index: 20; display: none; filter: drop-shadow(0 0 10px var(--red)); }
        
        .controls { background: #1c1c1e; padding: 20px; border-radius: 30px; border: 1px solid #333; }
        .input-area { background: #000; border-radius: 15px; padding: 15px; margin-bottom: 15px; border: 1px solid #444; text-align: center; }
        input { background: transparent; border: none; color: white; font-size: 30px; font-weight: 900; width: 100%; outline: none; }
        
        #btn { width: 100%; padding: 20px; border-radius: 18px; border: none; font-size: 25px; font-weight: 900; transition: 0.1s; }
        .bet-btn { background: var(--green); color: white; }
        .cash-btn { background: var(--gold); color: black; }

        canvas { position: absolute; inset: 0; }
        
        /* Visual Flash for No-Sound fallback */
        .flash-red { animation: f-red 0.3s forwards; }
        @keyframes f-red { 0% { background: #500; } 100% { background: #050505; } }
    </style>
</head>
<body>

<div id="audio-gate">
    <h1>✈️</h1>
    <p style="color:#888; letter-spacing: 2px;">SYSTEM READY</p>
    <button onclick="unlock()">ENABLE SOUND & START</button>
    <p style="color:var(--red); font-size: 12px; margin-top: 20px;">⚠️ PLEASE TURN OFF SILENT MODE ⚠️</p>
</div>

<div class="container">
    <div style="display:flex; justify-content: space-between; font-weight: bold; color: var(--green);">
        <span>₹<span id="balance">1000.00</span></span>
        <span style="color:#444">JARVIS V3</span>
    </div>
    
    <div class="screen" id="game-screen">
        <div id="mult">1.00x</div>
        <svg id="plane" viewBox="0 0 64 64"><path fill="#ff003c" d="M62,32c0-1.1-0.9-2-2-2H42.7L28.1,7.2C27.6,6.5,26.8,6,25.9,6h-5.5c-0.8,0-1.4,0.7-1.3,1.5l5,18.5H10.2l-3.4-6.8 C6.4,18.5,5.7,18,5,18H2c-0.6,0-1,0.4-1,1s0.4,1,1,1h1.6l3.4,6.8c0.2,0.4,0.6,0.7,1.1,0.7h16.2L18.9,47.5c-0.1,0.3-0.1,0.6,0.1,0.9 c0.2,0.3,0.5,0.5,0.9,0.5h5.5c0.9,0,1.7-0.5,2.2-1.2L42.7,34H60C61.1,34,62,33.1,62,32z"/></svg>
        <canvas id="cvs"></canvas>
    </div>

    <div class="controls">
        <div class="input-area"><input type="number" id="bet" value="10" inputmode="decimal"></div>
        <button id="btn" class="bet-btn" onclick="mainAction()">BET</button>
    </div>
</div>

<script>
    // iPhone Sound Fix: oscillators & synthesis (No external files needed)
    let audioCtx;
    
    function unlock() {
        document.getElementById('audio-gate').style.display = 'none';
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        // Create a silent buffer to wake up iOS audio
        const buffer = audioCtx.createBuffer(1, 1, 22050);
        const source = audioCtx.createBufferSource();
        source.buffer = buffer;
        source.connect(audioCtx.destination);
        source.start(0);
    }

    function playBeep(freq, type, duration, vol) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }

    const cvs = document.getElementById('cvs'), ctx = cvs.getContext('2d');
    const display = document.getElementById('mult'), plane = document.getElementById('plane'), btn = document.getElementById('btn');
    
    let bal = 1000, running = false, multiplier = 1.0, crashAt = 0, startT = 0, aid;

    window.onresize = () => { cvs.width = cvs.offsetWidth; cvs.height = cvs.offsetHeight; };
    window.onresize();

    function mainAction() { if(!running) start(); else cash(); }

    function start() {
        let amt = parseFloat(document.getElementById('bet').value);
        if(amt > bal) return;
        bal -= amt; updateUI();
        
        running = true; multiplier = 1.0;
        crashAt = Math.random() < 0.2 ? 1.1 + Math.random() : 2 + Math.random() * 8;
        
        btn.innerText = "CASH OUT"; btn.className = "cash-btn";
        display.style.color = "white"; plane.style.display = "block";
        document.getElementById('game-screen').classList.remove('flash-red');

        startT = Date.now();
        gameLoop();
    }

    function gameLoop() {
        if(!running) return;
        let t = (Date.now() - startT) / 1000;
        multiplier = Math.pow(1.18, t * 3.5).toFixed(2);
        
        if(parseFloat(multiplier) >= crashAt) return finish(true);
        
        // ENGINE HUM (Slight beep every frame for sound feel)
        if(Math.random() < 0.1) playBeep(100 + (multiplier*10), 'sawtooth', 0.1, 0.05);

        display.innerText = multiplier + "x";
        draw(t);
        aid = requestAnimationFrame(gameLoop);
    }

    function draw(t) {
        ctx.clearRect(0,0,cvs.width,cvs.height);
        let x = t * 70, y = cvs.height - (Math.pow(1.12, x/8) * 15);
        
        // Glowy Path
        ctx.beginPath(); ctx.strokeStyle = "#ff003c"; ctx.lineWidth = 6;
        ctx.shadowBlur = 15; ctx.shadowColor = "#ff003c";
        ctx.moveTo(0, cvs.height);
        for(let i=0; i<=x; i++) ctx.lineTo(i, cvs.height - (Math.pow(1.12, i/8) * 15));
        ctx.stroke();

        plane.style.left = (x - 25) + "px"; plane.style.top = (y - 30) + "px";
        plane.style.transform = `rotate(-${Math.min(x/5, 40)}deg)`;
    }

    function cash() {
        let amt = parseFloat(document.getElementById('bet').value);
        bal += (amt * multiplier);
        playBeep(800, 'sine', 0.5, 0.2); // WIN SOUND
        finish(false);
    }

    function finish(crashed) {
        running = false; cancelAnimationFrame(aid);
        if(crashed) {
            playBeep(150, 'square', 0.4, 0.3); // CRASH SOUND
            display.innerText = "FLEW AWAY!";
            display.style.color = "var(--red)";
            plane.style.display = "none";
            document.getElementById('game-screen').classList.add('flash-red');
        }
        btn.innerText = "BET"; btn.className = "bet-btn";
        updateUI();
    }

    function updateUI() { document.getElementById('balance').innerText = bal.toFixed(2); }
</script>
</body>
</html>
