<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviator Ultimate Replica</title>
    <style>
        :root {
            --bg-dark: #090909;
            --panel-bg: #1b1c21;
            --accent-red: #cb011a;
            --win-green: #28a745;
            --gold: #ffc107;
        }

        body {
            margin: 0;
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Loading Overlay */
        #loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 0.5s;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #333;
            border-top: 5px solid var(--accent-red);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Big Win Popup */
        #win-popup {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: rgba(0,0,0,0.9);
            padding: 40px;
            border: 2px solid var(--gold);
            border-radius: 20px;
            text-align: center;
            z-index: 50;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #win-popup.show { transform: translate(-50%, -50%) scale(1); }

        .game-wrapper { width: 95%; max-width: 900px; display: flex; flex-direction: column; gap: 10px; }

        .history-bar {
            display: flex; gap: 8px; background: #141518; padding: 10px;
            border-radius: 20px; overflow-x: auto; border: 1px solid #2c2d30;
        }

        .hist-item { padding: 4px 12px; border-radius: 15px; font-size: 12px; font-weight: bold; background: #2c2d30; color: #9d50bb; }

        .stage {
            position: relative; background: radial-gradient(circle at center, #1a1a1a, #000);
            height: 350px; border-radius: 15px; border: 1px solid #2c2d30; overflow: hidden;
        }

        #multiplier {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            font-size: 80px; font-weight: 900; z-index: 5;
        }

        #plane-icon { position: absolute; width: 50px; z-index: 10; display: none; filter: drop-shadow(0 0 10px red); }

        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; background: var(--panel-bg); padding: 20px; border-radius: 15px; }

        .bet-box { background: #141518; border-radius: 10px; padding: 15px; text-align: center; border: 1px solid #333; }

        input { background: #000; border: 1px solid #444; color: white; padding: 8px; width: 100px; border-radius: 5px; text-align: center; font-size: 18px; margin-bottom: 10px; }

        .btn-main { width: 100%; padding: 12px; border-radius: 10px; border: none; font-size: 18px; font-weight: 900; cursor: pointer; }

        .bet-btn { background: var(--win-green); color: white; }
        .cash-btn { background: #d29100; color: white; }
        .flew-away { color: var(--accent-red) !important; }
    </style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <p>CONNECTING TO SERVER...</p>
</div>

<div id="win-popup">
    <h1 style="color:var(--gold); margin:0;">BIG WIN!</h1>
    <h2 id="win-amount" style="font-size:40px;">₹0.00</h2>
    <p>MULTIPLIER: <span id="win-mult">0x</span></p>
</div>

<div class="game-wrapper">
    <div style="display:flex; justify-content: space-between; font-size: 14px; color: var(--win-green);">
        <span>JARVIS PRO</span>
        <span>Balance: ₹<span id="balance">1000.00</span></span>
    </div>
    
    <div class="history-bar" id="history"></div>

    <div class="stage">
        <div id="multiplier">1.00x</div>
        <svg id="plane-icon" viewBox="0 0 64 64"><path fill="#cb011a" d="M62,32c0-1.1-0.9-2-2-2H42.7L28.1,7.2C27.6,6.5,26.8,6,25.9,6h-5.5c-0.8,0-1.4,0.7-1.3,1.5l5,18.5H10.2l-3.4-6.8 C6.4,18.5,5.7,18,5,18H2c-0.6,0-1,0.4-1,1s0.4,1,1,1h1.6l3.4,6.8c0.2,0.4,0.6,0.7,1.1,0.7h16.2L18.9,47.5c-0.1,0.3-0.1,0.6,0.1,0.9 c0.2,0.3,0.5,0.5,0.9,0.5h5.5c0.9,0,1.7-0.5,2.2-1.2L42.7,34H60C61.1,34,62,33.1,62,32z"/></svg>
        <canvas id="canvas"></canvas>
    </div>

    <div class="controls">
        <div class="bet-box">
            <input type="number" id="bet-amt" value="100">
            <button id="main-btn" class="btn-main bet-btn" onclick="toggleGame()">BET</button>
        </div>
        <div class="bet-box" style="opacity:0.5"><button class="btn-main bet-btn" disabled>AUTO BET</button></div>
    </div>
</div>

<script>
    // Audio Context Setup
    const sndWin = new Audio('https://cdn.pixabay.com/audio/2021/08/04/audio_0625c15354.mp3');
    const sndCrash = new Audio('https://cdn.pixabay.com/audio/2022/03/10/audio_c3523e58c5.mp3');
    const sndEngine = new Audio('https://cdn.pixabay.com/audio/2022/03/15/audio_2492167e7d.mp3');
    sndEngine.loop = true;

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const multDisplay = document.getElementById('multiplier');
    const plane = document.getElementById('plane-icon');
    const mainBtn = document.getElementById('main-btn');

    let balance = 1000, multiplier = 1.0, isRunning = false, crashVal = 0, startT = 0, animId;

    window.onload = () => { setTimeout(() => document.getElementById('loader').style.opacity = '0', 1500); setTimeout(() => document.getElementById('loader').style.display = 'none', 2000); };
    window.onresize = () => { canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight; };
    window.onresize();

    function toggleGame() {
        if (!isRunning) {
            let bet = parseFloat(document.getElementById('bet-amt').value);
            if (bet > balance) return;
            balance -= bet;
            updateUI();
            isRunning = true;
            multiplier = 1.0;
            crashVal = (Math.random() < 0.2 ? Math.random() * 1.5 + 1.1 : Math.random() * 5 + 1.5);
            mainBtn.innerText = "CASH OUT";
            mainBtn.className = "btn-main cash-btn";
            multDisplay.classList.remove('flew-away');
            plane.style.display = "block";
            sndEngine.play();
            startT = Date.now();
            animate();
        } else {
            cashOut();
        }
    }

    function animate() {
        if (!isRunning) return;
        let elapsed = (Date.now() - startT) / 1000;
        multiplier = Math.pow(1.15, elapsed * 3.5).toFixed(2);

        if (parseFloat(multiplier) >= crashVal) return finish(true);
        multDisplay.innerText = multiplier + "x";
        draw(elapsed);
        animId = requestAnimationFrame(animate);
    }

    function draw(t) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        let px = t * 60, py = canvas.height - (Math.pow(1.1, px/6) * 10);
        ctx.beginPath(); ctx.strokeStyle = "#cb011a"; ctx.lineWidth = 4; ctx.moveTo(0, canvas.height);
        for(let i=0; i<px; i++){ ctx.lineTo(i, canvas.height - (Math.pow(1.1, i/6) * 10)); }
        ctx.stroke();
        plane.style.left = (px - 25) + "px"; plane.style.top = (py - 25) + "px";
        plane.style.transform = `rotate(-${Math.min(px/4, 40)}deg)`;
    }

    function cashOut() {
        let win = parseFloat(document.getElementById('bet-amt').value) * multiplier;
        balance += win;
        if (multiplier >= 5) {
            document.getElementById('win-amount').innerText = "₹" + win.toFixed(2);
            document.getElementById('win-mult').innerText = multiplier + "x";
            document.getElementById('win-popup').classList.add('show');
            setTimeout(() => document.getElementById('win-popup').classList.remove('show'), 3000);
        }
        sndWin.play();
        finish(false);
    }

    function finish(crashed) {
        isRunning = false; cancelAnimationFrame(animId);
        sndEngine.pause(); sndEngine.currentTime = 0;
        if (crashed) { sndCrash.play(); multDisplay.innerText = "FLEW AWAY!"; multDisplay.classList.add('flew-away'); plane.style.display="none"; }
        
        let hist = document.getElementById('history');
        let div = document.createElement('div'); div.className="hist-item"; div.innerText = multiplier + "x";
        hist.prepend(div);
        
        mainBtn.innerText = "BET"; mainBtn.className = "btn-main bet-btn";
        updateUI();
    }

    function updateUI() { document.getElementById('balance').innerText = balance.toFixed(2); }
</script>
</body>
</html>
