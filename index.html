<!DOCTYPE html>
<html>
<head>
<title>Jarvis Aviator Casino</title>

<style>
body{
  margin:0;
  background:radial-gradient(circle,#020617,#000);
  color:white;
  font-family:system-ui;
  text-align:center;
  overflow:hidden;
}

h1{color:#22c55e;}

#multiplier{
  font-size:90px;
  text-shadow:0 0 30px red,0 0 60px red;
}

#gameArea{
  position:relative;
  width:100%;
  height:320px;
  overflow:hidden;
  border-top:1px solid #1e293b;
  border-bottom:1px solid #1e293b;
}

/* moving grid */
#grid{
  position:absolute;
  width:200%;
  height:100%;
  background:
    linear-gradient(#0f172a 1px, transparent 1px),
    linear-gradient(90deg,#0f172a 1px, transparent 1px);
  background-size:40px 40px;
  animation:gridMove 2s linear infinite;
}
@keyframes gridMove{
  from{transform:translateX(0);}
  to{transform:translateX(-40px);}
}

canvas{position:absolute;}

#plane{
  position:absolute;
  font-size:36px;
  transform:translate(-50%,-50%);
  filter:drop-shadow(0 0 12px red);
}

button{
  padding:10px 18px;
  margin:6px;
  border:none;
  border-radius:6px;
  font-weight:bold;
}

#betBtn{background:#22c55e;}
#cashBtn{background:#ef4444;}

.flash{
  animation:flash 0.3s;
}
@keyframes flash{
  0%{background:red;}
  100%{background:#020617;}
}
</style>
</head>

<body>

<h1>✈️ Jarvis Aviator</h1>

<div id="balance">Balance: ₹1000</div>
<div id="multiplier">1.00x</div>

<input type="number" id="bet" value="100"><br>

<button id="betBtn" onclick="startGame()">Bet</button>
<button id="cashBtn" onclick="cashOut()">Cash Out</button>

<div id="gameArea">
  <div id="grid"></div>
  <canvas id="graph" width="900" height="320"></canvas>
  <div id="plane">✈️</div>
</div>

<p id="result"></p>

<!-- SOUND -->
<audio id="engine" src="https://www.soundjay.com/mechanical/airplane-flying-01.mp3" loop></audio>
<audio id="crash" src="https://www.soundjay.com/explosion/explosion-01.mp3"></audio>
<audio id="click" src="https://www.soundjay.com/buttons/button-3.mp3"></audio>

<script>

let multiplier=1,balance=1000,bet=100;
let crashed=true,x=60;

let ctx=document.getElementById("graph").getContext("2d");
let plane=document.getElementById("plane");

let engine=document.getElementById("engine");
let crashSound=document.getElementById("crash");
let clickSound=document.getElementById("click");

// iPhone unlock sound
document.body.addEventListener("click",()=>{
engine.play().then(()=>engine.pause());
},{once:true});

// START GAME
function startGame(){

clickSound.play();

bet=parseInt(document.getElementById("bet").value);
if(bet>balance) return alert("Low balance");

balance-=bet;
document.getElementById("balance").innerText="Balance: ₹"+balance;

multiplier=1;
crashed=false;
x=60;

ctx.clearRect(0,0,900,320);
ctx.beginPath();
ctx.moveTo(60,300);

// engine sound
engine.currentTime=0;
engine.play().catch(()=>{});

function animate(){

if(crashed) return;

multiplier*=1.025;
document.getElementById("multiplier").innerText=multiplier.toFixed(2)+"x";

let y=300-Math.pow(multiplier,1.6)*3;
if(y<50) y=50;

// glow line
ctx.strokeStyle="red";
ctx.shadowBlur=30;
ctx.lineWidth=6;
ctx.lineTo(x,y);
ctx.stroke();

// plane
plane.style.left=x+"px";
plane.style.top=y+"px";

let angle=Math.min(50,multiplier*4);
plane.style.transform=`translate(-50%,-50%) rotate(${angle}deg)`;

x+=3;

// crash
if(Math.random()<0.012+multiplier/120){
crashed=true;

engine.pause();
crashSound.currentTime=0;
crashSound.play().catch(()=>{});

// flash effect
document.body.classList.add("flash");
setTimeout(()=>document.body.classList.remove("flash"),300);

document.getElementById("result").innerText="💥 "+multiplier.toFixed(2)+"x";
return;
}

requestAnimationFrame(animate);
}

animate();
}

// CASH OUT
function cashOut(){

clickSound.play();

if(!crashed){
crashed=true;

engine.pause();

let win=bet*multiplier;
balance+=Math.floor(win);

document.getElementById("balance").innerText="Balance: ₹"+balance;
document.getElementById("result").innerText="✅ "+multiplier.toFixed(2)+"x";
}
}

</script>
</body>
</html>
